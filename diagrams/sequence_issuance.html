<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Sequence Diagram — Certificate Issuance</title>
<style>
  body { margin: 0; background: white; display: flex; flex-direction: column;
         align-items: center; padding: 20px; font-family: "Times New Roman", serif; }
  svg  { border: 1px solid #ddd; background: white; }
  .caption { margin-top: 10px; font-size: 13px; font-style: italic; text-align: center; color: #333; }
</style>
</head>
<body>
<svg width="820" height="640" viewBox="0 0 820 640">

  <!-- ── PARTICIPANT BOXES ── -->
  <!-- Spacing: participants at x = 80, 210, 360, 510, 680 (centres) -->

  <!-- P1: Institution User -->
  <rect x="20" y="20" width="120" height="44" rx="4" fill="#E8EAF6" stroke="#333" stroke-width="1.2"/>
  <text font-family="Times New Roman" font-size="12" font-weight="bold"
        text-anchor="middle" x="80" y="38">Institution</text>
  <text font-family="Times New Roman" font-size="11"
        text-anchor="middle" x="80" y="55">User</text>

  <!-- P2: Browser / Frontend -->
  <rect x="150" y="20" width="120" height="44" rx="4" fill="#E8F5E9" stroke="#333" stroke-width="1.2"/>
  <text font-family="Times New Roman" font-size="12" font-weight="bold"
        text-anchor="middle" x="210" y="38">Browser /</text>
  <text font-family="Times New Roman" font-size="11"
        text-anchor="middle" x="210" y="55">Frontend</text>

  <!-- P3: CertificateRegistry -->
  <rect x="300" y="20" width="140" height="44" rx="4" fill="#FFF8E1" stroke="#333" stroke-width="1.2"/>
  <text font-family="Times New Roman" font-size="12" font-weight="bold"
        text-anchor="middle" x="370" y="38">Certificate</text>
  <text font-family="Times New Roman" font-size="11"
        text-anchor="middle" x="370" y="55">Registry</text>

  <!-- P4: InstitutionRegistry -->
  <rect x="460" y="20" width="140" height="44" rx="4" fill="#FCE4EC" stroke="#333" stroke-width="1.2"/>
  <text font-family="Times New Roman" font-size="12" font-weight="bold"
        text-anchor="middle" x="530" y="38">Institution</text>
  <text font-family="Times New Roman" font-size="11"
        text-anchor="middle" x="530" y="55">Registry</text>

  <!-- P5: IPFS -->
  <rect x="620" y="20" width="120" height="44" rx="4" fill="#F3E5F5" stroke="#333" stroke-width="1.2"/>
  <text font-family="Times New Roman" font-size="12" font-weight="bold"
        text-anchor="middle" x="680" y="38">IPFS</text>
  <text font-family="Times New Roman" font-size="11"
        text-anchor="middle" x="680" y="55">(Pinata)</text>

  <!-- ── LIFELINES (dashed vertical) ── -->
  <line x1="80"  y1="64" x2="80"  y2="620" stroke="#888" stroke-width="1" stroke-dasharray="5 4"/>
  <line x1="210" y1="64" x2="210" y2="620" stroke="#888" stroke-width="1" stroke-dasharray="5 4"/>
  <line x1="370" y1="64" x2="370" y2="620" stroke="#888" stroke-width="1" stroke-dasharray="5 4"/>
  <line x1="530" y1="64" x2="530" y2="620" stroke="#888" stroke-width="1" stroke-dasharray="5 4"/>
  <line x1="680" y1="64" x2="680" y2="620" stroke="#888" stroke-width="1" stroke-dasharray="5 4"/>

  <!-- ── ACTIVATION BOXES ── -->
  <rect x="76"  y="110" width="8" height="480" fill="#9FA8DA" stroke="#555" stroke-width="0.8"/>
  <rect x="206" y="130" width="8" height="460" fill="#A5D6A7" stroke="#555" stroke-width="0.8"/>
  <rect x="366" y="240" width="8" height="200" fill="#FFE082" stroke="#555" stroke-width="0.8"/>
  <rect x="526" y="280" width="8" height="60"  fill="#F48FB1" stroke="#555" stroke-width="0.8"/>
  <rect x="676" y="170" width="8" height="80"  fill="#CE93D8" stroke="#555" stroke-width="0.8"/>

  <!-- ── MESSAGES ── -->

  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrow-solid" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#333"/>
    </marker>
    <marker id="arrow-open" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10" fill="none" stroke="#333" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- M1: Institution → Browser: Enter certificate data + select PDF -->
  <line x1="84" y1="120" x2="206" y2="120" stroke="#333" stroke-width="1.2"
        marker-end="url(#arrow-solid)"/>
  <text font-family="Times New Roman" font-size="11" x="88" y="115">1. Enter certificate data + select PDF file</text>

  <!-- M2: Browser self-call: compute SHA-256(PDF) = docHash -->
  <path d="M 214 155 Q 255 155 255 170 Q 255 185 214 185"
        fill="none" stroke="#333" stroke-width="1.2" marker-end="url(#arrow-open)"/>
  <text font-family="Times New Roman" font-size="11" x="220" y="165">2. Compute SHA-256(PDF) = docHash</text>

  <!-- M3: Browser → IPFS: Upload certificate PDF -->
  <line x1="214" y1="200" x2="676" y2="200" stroke="#333" stroke-width="1.2"
        marker-end="url(#arrow-solid)"/>
  <text font-family="Times New Roman" font-size="11" x="218" y="195">3. Upload certificate PDF to IPFS</text>

  <!-- M4: IPFS → Browser: Return ipfsCid -->
  <line x1="676" y1="230" x2="214" y2="230" stroke="#555" stroke-width="1.2"
        stroke-dasharray="6 3" marker-end="url(#arrow-open)"/>
  <text font-family="Times New Roman" font-size="11" x="420" y="225">4. Return: ipfsCid</text>

  <!-- M5: Browser → CertificateRegistry: issueCertificate(CertificateInput) -->
  <line x1="214" y1="260" x2="366" y2="260" stroke="#333" stroke-width="1.2"
        marker-end="url(#arrow-solid)"/>
  <text font-family="Times New Roman" font-size="11" x="218" y="255">5. issueCertificate(CertificateInput struct)</text>

  <!-- M6: CertReg → InstReg: isRegistered(msg.sender) -->
  <line x1="374" y1="290" x2="526" y2="290" stroke="#333" stroke-width="1.2"
        marker-end="url(#arrow-solid)"/>
  <text font-family="Times New Roman" font-size="11" x="378" y="285">6. isRegistered(msg.sender)</text>

  <!-- M7: InstReg → CertReg: return true -->
  <line x1="526" y1="320" x2="374" y2="320" stroke="#555" stroke-width="1.2"
        stroke-dasharray="6 3" marker-end="url(#arrow-open)"/>
  <text font-family="Times New Roman" font-size="11" x="400" y="315">7. return: true</text>

  <!-- M8: CertReg self-call: keccak256(...) = metaHash -->
  <path d="M 374 355 Q 430 355 430 370 Q 430 385 374 385"
        fill="none" stroke="#333" stroke-width="1.2" marker-end="url(#arrow-open)"/>
  <text font-family="Times New Roman" font-size="11" x="380" y="365">8. metaHash = keccak256(issuer, studentId, programme, year)</text>

  <!-- M9: CertReg self-call: store Certificate struct on blockchain -->
  <path d="M 374 405 Q 430 405 430 420 Q 430 435 374 435"
        fill="none" stroke="#333" stroke-width="1.2" marker-end="url(#arrow-open)"/>
  <text font-family="Times New Roman" font-size="11" x="380" y="415">9. Store Certificate struct on blockchain</text>

  <!-- M10: CertReg → Browser: emit CertificateIssued event + metaHash -->
  <line x1="366" y1="460" x2="214" y2="460" stroke="#555" stroke-width="1.2"
        stroke-dasharray="6 3" marker-end="url(#arrow-open)"/>
  <text font-family="Times New Roman" font-size="11" x="222" y="455">10. emit CertificateIssued(metaHash, ...)</text>

  <!-- M11: Browser → Institution: Display metaHash / QR code -->
  <line x1="206" y1="490" x2="84" y2="490" stroke="#555" stroke-width="1.2"
        stroke-dasharray="6 3" marker-end="url(#arrow-open)"/>
  <text font-family="Times New Roman" font-size="11" x="88" y="485">11. Display metaHash + generate QR code</text>

  <!-- Legend -->
  <rect x="20" y="530" width="380" height="74" rx="4" fill="#F5F5F5" stroke="#ccc" stroke-width="1"/>
  <text font-family="Times New Roman" font-size="12" font-weight="bold" x="30" y="550">Legend:</text>
  <line x1="30" y1="568" x2="80" y2="568" stroke="#333" stroke-width="1.5" marker-end="url(#arrow-solid)"/>
  <text font-family="Times New Roman" font-size="11" x="86" y="572">Synchronous call (state change / transaction)</text>
  <line x1="30" y1="592" x2="80" y2="592" stroke="#555" stroke-width="1.5"
        stroke-dasharray="6 3" marker-end="url(#arrow-open)"/>
  <text font-family="Times New Roman" font-size="11" x="86" y="596">Return message</text>

</svg>
<div class="caption">Figure 3.2: Sequence Diagram — Certificate Issuance Process</div>
</body>
</html>
