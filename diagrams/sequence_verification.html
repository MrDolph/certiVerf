<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Sequence Diagram — Certificate Verification</title>
<style>
  body { margin: 0; background: white; display: flex; flex-direction: column;
         align-items: center; padding: 20px; font-family: "Times New Roman", serif; }
  svg  { border: 1px solid #ddd; background: white; }
  .caption { margin-top: 10px; font-size: 13px; font-style: italic; text-align: center; color: #333; }
</style>
</head>
<body>
<svg width="780" height="560" viewBox="0 0 780 560">

  <!-- ── PARTICIPANT BOXES ── -->

  <!-- P1: Verifier (Employer / Public) -->
  <rect x="20" y="20" width="130" height="44" rx="4" fill="#E8EAF6" stroke="#333" stroke-width="1.2"/>
  <text font-family="Times New Roman" font-size="12" font-weight="bold"
        text-anchor="middle" x="85" y="38">Verifier</text>
  <text font-family="Times New Roman" font-size="11"
        text-anchor="middle" x="85" y="55">(Employer / Public)</text>

  <!-- P2: verify.html -->
  <rect x="185" y="20" width="130" height="44" rx="4" fill="#E8F5E9" stroke="#333" stroke-width="1.2"/>
  <text font-family="Times New Roman" font-size="12" font-weight="bold"
        text-anchor="middle" x="250" y="38">verify.html</text>
  <text font-family="Times New Roman" font-size="11"
        text-anchor="middle" x="250" y="55">(ethers.js v6)</text>

  <!-- P3: Alchemy RPC -->
  <rect x="350" y="20" width="130" height="44" rx="4" fill="#FFF8E1" stroke="#333" stroke-width="1.2"/>
  <text font-family="Times New Roman" font-size="12" font-weight="bold"
        text-anchor="middle" x="415" y="38">Alchemy RPC</text>
  <text font-family="Times New Roman" font-size="11"
        text-anchor="middle" x="415" y="55">(Polygon Amoy)</text>

  <!-- P4: CertificateRegistry -->
  <rect x="515" y="20" width="140" height="44" rx="4" fill="#FCE4EC" stroke="#333" stroke-width="1.2"/>
  <text font-family="Times New Roman" font-size="12" font-weight="bold"
        text-anchor="middle" x="585" y="38">Certificate</text>
  <text font-family="Times New Roman" font-size="11"
        text-anchor="middle" x="585" y="55">Registry</text>

  <!-- ── LIFELINES ── -->
  <line x1="85"  y1="64" x2="85"  y2="530" stroke="#888" stroke-width="1" stroke-dasharray="5 4"/>
  <line x1="250" y1="64" x2="250" y2="530" stroke="#888" stroke-width="1" stroke-dasharray="5 4"/>
  <line x1="415" y1="64" x2="415" y2="530" stroke="#888" stroke-width="1" stroke-dasharray="5 4"/>
  <line x1="585" y1="64" x2="585" y2="530" stroke="#888" stroke-width="1" stroke-dasharray="5 4"/>

  <!-- ── ACTIVATION BOXES ── -->
  <rect x="81"  y="108" width="8" height="390" fill="#9FA8DA" stroke="#555" stroke-width="0.8"/>
  <rect x="246" y="128" width="8" height="370" fill="#A5D6A7" stroke="#555" stroke-width="0.8"/>
  <rect x="411" y="178" width="8" height="230" fill="#FFE082" stroke="#555" stroke-width="0.8"/>
  <rect x="581" y="218" width="8" height="150" fill="#F48FB1" stroke="#555" stroke-width="0.8"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr-s" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#333"/>
    </marker>
    <marker id="arr-o" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10" fill="none" stroke="#333" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- ── MESSAGES ── -->

  <!-- M1: Verifier → verify.html: Enter metaHash, click Verify -->
  <line x1="89" y1="120" x2="246" y2="120" stroke="#333" stroke-width="1.2"
        marker-end="url(#arr-s)"/>
  <text font-family="Times New Roman" font-size="11" x="93" y="115">
    1. Enter metaHash (0x...) — click Verify
  </text>

  <!-- M2: verify.html self: validate input format -->
  <path d="M 254 155 Q 300 155 300 170 Q 300 185 254 185"
        fill="none" stroke="#333" stroke-width="1.2" marker-end="url(#arr-o)"/>
  <text font-family="Times New Roman" font-size="11" x="260" y="165">
    2. Validate: starts with 0x, length = 66 chars
  </text>

  <!-- M3: verify.html → Alchemy: JsonRpcProvider call -->
  <line x1="254" y1="200" x2="411" y2="200" stroke="#333" stroke-width="1.2"
        marker-end="url(#arr-s)"/>
  <text font-family="Times New Roman" font-size="11" x="258" y="195">
    3. eth_call: verifyCertificate(metaHash)
  </text>

  <!-- M4: Alchemy → CertificateRegistry: query blockchain state -->
  <line x1="419" y1="230" x2="581" y2="230" stroke="#333" stroke-width="1.2"
        marker-end="url(#arr-s)"/>
  <text font-family="Times New Roman" font-size="11" x="423" y="225">
    4. Query on-chain storage
  </text>

  <!-- M5: CertReg self: read Certificate struct from mapping -->
  <path d="M 589 265 Q 640 265 640 280 Q 640 295 589 295"
        fill="none" stroke="#333" stroke-width="1.2" marker-end="url(#arr-o)"/>
  <text font-family="Times New Roman" font-size="11" x="595" y="276">
    5. Read certificates[metaHash]
  </text>

  <!-- M6: CertReg → Alchemy: return Certificate struct -->
  <line x1="581" y1="320" x2="419" y2="320" stroke="#555" stroke-width="1.2"
        stroke-dasharray="6 3" marker-end="url(#arr-o)"/>
  <text font-family="Times New Roman" font-size="11" x="430" y="315">
    6. Return: Certificate struct
  </text>

  <!-- M7: Alchemy → verify.html: return decoded result -->
  <line x1="411" y1="350" x2="254" y2="350" stroke="#555" stroke-width="1.2"
        stroke-dasharray="6 3" marker-end="url(#arr-o)"/>
  <text font-family="Times New Roman" font-size="11" x="258" y="345">
    7. Return: decoded Certificate struct
  </text>

  <!-- M8: verify.html self: render result -->
  <path d="M 254 380 Q 310 380 310 395 Q 310 410 254 410"
        fill="none" stroke="#333" stroke-width="1.2" marker-end="url(#arr-o)"/>
  <text font-family="Times New Roman" font-size="11" x="260" y="391">
    8. Render certificate fields + status badge
  </text>

  <!-- M9: verify.html → Verifier: Display VALID / REVOKED result -->
  <line x1="246" y1="435" x2="89" y2="435" stroke="#555" stroke-width="1.2"
        stroke-dasharray="6 3" marker-end="url(#arr-o)"/>
  <text font-family="Times New Roman" font-size="11" x="93" y="430">
    9. Display: ✓ VALID or ✗ REVOKED + full details
  </text>

  <!-- NOTE: No wallet required -->
  <rect x="20" y="460" width="480" height="50" rx="4" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
  <text font-family="Times New Roman" font-size="12" font-weight="bold" x="30" y="480">
    Design Note:
  </text>
  <text font-family="Times New Roman" font-size="11" x="30" y="498">
    Verification uses JsonRpcProvider (read-only) — no MetaMask wallet, no gas fee,
    no account required.
  </text>

  <!-- Legend -->
  <rect x="520" y="460" width="240" height="74" rx="4" fill="#F5F5F5" stroke="#ccc" stroke-width="1"/>
  <text font-family="Times New Roman" font-size="12" font-weight="bold" x="530" y="480">Legend:</text>
  <line x1="530" y1="498" x2="580" y2="498" stroke="#333" stroke-width="1.5"
        marker-end="url(#arr-s)"/>
  <text font-family="Times New Roman" font-size="11" x="586" y="502">Synchronous call</text>
  <line x1="530" y1="522" x2="580" y2="522" stroke="#555" stroke-width="1.5"
        stroke-dasharray="6 3" marker-end="url(#arr-o)"/>
  <text font-family="Times New Roman" font-size="11" x="586" y="526">Return message</text>

</svg>
<div class="caption">Figure 3.3: Sequence Diagram — Certificate Verification Process</div>
</body>
</html>
