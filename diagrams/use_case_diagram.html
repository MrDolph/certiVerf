<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Use Case Diagram - CertiVerf System</title>
<style>
  body { margin: 0; background: white; display: flex; flex-direction: column; align-items: center; padding: 20px; font-family: "Times New Roman", serif; }
  svg { border: 1px solid #ddd; background: white; }
  .caption { margin-top: 10px; font-size: 13px; font-style: italic; text-align: center; color: #333; }
</style>
</head>
<body>
<svg width="720" height="560" viewBox="0 0 720 560">

  <!-- System Boundary -->
  <rect x="148" y="28" width="424" height="500" rx="4"
        fill="#FAFAFA" stroke="#222" stroke-width="1.8"/>
  <text font-family="Times New Roman" font-size="10" text-anchor="middle"
        x="360" y="46" fill="#555">«system»</text>
  <text font-family="Times New Roman" font-size="14" font-weight="bold"
        text-anchor="middle" x="360" y="66">Blockchain Certificate Verification System</text>

  <!-- ── USE CASES ── -->

  <!-- UC1: Request Registration -->
  <ellipse cx="360" cy="118" rx="105" ry="24" fill="white" stroke="#333" stroke-width="1.2"/>
  <text font-family="Times New Roman" font-size="12" text-anchor="middle" x="360" y="122">Request Registration</text>

  <!-- UC2: Approve Registration -->
  <ellipse cx="268" cy="210" rx="108" ry="24" fill="white" stroke="#333" stroke-width="1.2"/>
  <text font-family="Times New Roman" font-size="12" text-anchor="middle" x="268" y="214">Approve Registration</text>

  <!-- UC3: Reject Registration -->
  <ellipse cx="462" cy="210" rx="95" ry="24" fill="white" stroke="#333" stroke-width="1.2"/>
  <text font-family="Times New Roman" font-size="12" text-anchor="middle" x="462" y="214">Reject Registration</text>

  <!-- UC4: Issue Certificate -->
  <ellipse cx="268" cy="320" rx="98" ry="24" fill="white" stroke="#333" stroke-width="1.2"/>
  <text font-family="Times New Roman" font-size="12" text-anchor="middle" x="268" y="324">Issue Certificate</text>

  <!-- UC5: Revoke Certificate -->
  <ellipse cx="268" cy="420" rx="98" ry="24" fill="white" stroke="#333" stroke-width="1.2"/>
  <text font-family="Times New Roman" font-size="12" text-anchor="middle" x="268" y="424">Revoke Certificate</text>

  <!-- UC6: Verify Certificate -->
  <ellipse cx="462" cy="370" rx="98" ry="24" fill="white" stroke="#333" stroke-width="1.2"/>
  <text font-family="Times New Roman" font-size="12" text-anchor="middle" x="462" y="374">Verify Certificate</text>

  <!-- ── ACTOR 1: NUC Admin (upper left) ── -->
  <circle cx="62" cy="178" r="14" fill="none" stroke="#222" stroke-width="1.8"/>
  <line x1="62" y1="192" x2="62" y2="228" stroke="#222" stroke-width="1.8"/>
  <line x1="40" y1="208" x2="84" y2="208" stroke="#222" stroke-width="1.8"/>
  <line x1="62" y1="228" x2="44" y2="254" stroke="#222" stroke-width="1.8"/>
  <line x1="62" y1="228" x2="80" y2="254" stroke="#222" stroke-width="1.8"/>
  <text font-family="Times New Roman" font-size="12" font-weight="bold"
        text-anchor="middle" x="62" y="272">NUC Admin</text>
  <text font-family="Times New Roman" font-size="11" text-anchor="middle"
        x="62" y="286" fill="#555">(Regulatory Auth.)</text>

  <!-- ── ACTOR 2: Institution (lower left) ── -->
  <circle cx="62" cy="362" r="14" fill="none" stroke="#222" stroke-width="1.8"/>
  <line x1="62" y1="376" x2="62" y2="412" stroke="#222" stroke-width="1.8"/>
  <line x1="40" y1="392" x2="84" y2="392" stroke="#222" stroke-width="1.8"/>
  <line x1="62" y1="412" x2="44" y2="438" stroke="#222" stroke-width="1.8"/>
  <line x1="62" y1="412" x2="80" y2="438" stroke="#222" stroke-width="1.8"/>
  <text font-family="Times New Roman" font-size="12" font-weight="bold"
        text-anchor="middle" x="62" y="456">Institution</text>
  <text font-family="Times New Roman" font-size="11" text-anchor="middle"
        x="62" y="470" fill="#555">(e.g. UNILAG, OAU)</text>

  <!-- ── ACTOR 3: Verifier / Employer (right) ── -->
  <circle cx="658" cy="338" r="14" fill="none" stroke="#222" stroke-width="1.8"/>
  <line x1="658" y1="352" x2="658" y2="388" stroke="#222" stroke-width="1.8"/>
  <line x1="636" y1="368" x2="680" y2="368" stroke="#222" stroke-width="1.8"/>
  <line x1="658" y1="388" x2="640" y2="414" stroke="#222" stroke-width="1.8"/>
  <line x1="658" y1="388" x2="676" y2="414" stroke="#222" stroke-width="1.8"/>
  <text font-family="Times New Roman" font-size="12" font-weight="bold"
        text-anchor="middle" x="658" y="432">Verifier</text>
  <text font-family="Times New Roman" font-size="11" text-anchor="middle"
        x="658" y="446" fill="#555">(Employer / Public)</text>

  <!-- ── CONNECTIONS ── -->

  <!-- NUC Admin → Approve Registration (left edge: 268-108=160) -->
  <line x1="76" y1="206" x2="160" y2="210" stroke="#444" stroke-width="1.2"/>

  <!-- NUC Admin → Reject Registration (left edge: 462-95=367) -->
  <line x1="76" y1="202" x2="367" y2="205" stroke="#444" stroke-width="1.2"/>

  <!-- Institution → Request Registration (approximate diagonal to bottom-left of ellipse) -->
  <line x1="74" y1="368" x2="263" y2="140" stroke="#444" stroke-width="1.2"/>

  <!-- Institution → Issue Certificate (left edge: 268-98=170) -->
  <line x1="76" y1="378" x2="170" y2="320" stroke="#444" stroke-width="1.2"/>

  <!-- Institution → Revoke Certificate (left edge: 268-98=170) -->
  <line x1="76" y1="388" x2="170" y2="420" stroke="#444" stroke-width="1.2"/>

  <!-- Verifier → Verify Certificate (right edge: 462+98=560) -->
  <line x1="644" y1="358" x2="560" y2="368" stroke="#444" stroke-width="1.2"/>

  <!-- ── INCLUDE relationship: Issue Certificate <<include>> Verify Registration ── -->
  <!-- (optional dotted include line between Approve and Reject) -->

</svg>
<div class="caption">Figure 3.1: Use Case Diagram — Blockchain Certificate Verification System</div>
</body>
</html>
