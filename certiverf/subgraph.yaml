specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: InstitutionRegistry
    network: polygon-amoy
    source:
      address: "0x5416e493590141D710F367afA994F97A58116834"
      abi: InstitutionRegistry
      startBlock: 41541811
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - RegistrationApproved
        - RegistrationRejected
        - RegistrationRequested
      abis:
        - name: InstitutionRegistry
          file: ./abis/InstitutionRegistry.json
      eventHandlers:
        - event: RegistrationApproved(indexed address,string,uint256)
          handler: handleRegistrationApproved
        - event: RegistrationRejected(indexed address,string)
          handler: handleRegistrationRejected
        - event: RegistrationRequested(indexed address,string,string)
          handler: handleRegistrationRequested
      file: ./src/institution-registry.ts
