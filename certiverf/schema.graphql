type RegistrationApproved @entity(immutable: true) {
  id: Bytes!
  wallet: Bytes! # address
  name: String! # string
  timestamp: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type RegistrationRejected @entity(immutable: true) {
  id: Bytes!
  wallet: Bytes! # address
  name: String! # string
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type RegistrationRequested @entity(immutable: true) {
  id: Bytes!
  wallet: Bytes! # address
  name: String! # string
  acronym: String! # string
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}
type CertificateIssued @entity(immutable: true) {
  id: Bytes!
  metaHash: Bytes! # bytes32
  issuer: Bytes! # address
  institutionName: String! # string
  studentName: String! # string
  studentId: String! # string
  programme: String! # string
  issuedAt: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type CertificateRevoked @entity(immutable: true) {
  id: Bytes!
  metaHash: Bytes! # bytes32
  issuer: Bytes! # address
  reason: String! # string
  revokedAt: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}
